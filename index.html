<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Chamada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .celular { width: 360px; height: 740px; background: #000; border: 12px solid #333; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .tela { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; }
        .ativa { display: block; }
        #recebendo { background: url('calling.png') center/cover no-repeat, linear-gradient(180deg, #102a45 0%, #050e18 100%); }
        @keyframes pulsar {
            0% { transform: translate(-50%) scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.6); }
            70% { transform: translate(-50%) scale(1.08); box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); }
            100% { transform: translate(-50%) scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        .btn-atender { position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; background: #4caf50; border: none; border-radius: 50%; color: white; font-size: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center; animation: pulsar 1.5s infinite; -webkit-tap-highlight-color: transparent; }
        #andamento { background: url('andamento.png') center/cover no-repeat, linear-gradient(180deg, #091724 0%, #03080f 100%); }
        .cronometro { position: absolute; top: 30%; left: 0; width: 100%; text-align: center; color: white; font-size: 22px; font-variant-numeric: tabular-nums; font-weight: bold; }
        .status-dinamico { position: absolute; top: 38%; left: 0; width: 100%; text-align: center; color: #ff4d4d; font-size: 18px; font-weight: bold; letter-spacing: 1px; padding: 0 10px; line-height: 1.3; }
        .btn-desligar { position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; background: #f44336; border: none; border-radius: 50%; color: white; font-size: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
<div class="celular" id="aparelho">
    <div id="recebendo" class="tela ativa"><button class="btn-atender" onclick="atenderChamada()">📞</button></div>
    <div id="andamento" class="tela"><div id="tempo" class="cronometro">00:00</div><div id="statusTexto" class="status-dinamico"></div><button class="btn-desligar" onclick="desligarChamada()">❌</button></div>
</div>
<script>
    let timerIntervalo;
    let segundosTotais = 0;

    function atenderChamada() {
        const elementoCelular = document.getElementById('aparelho');
        if (elementoCelular.requestFullscreen) { elementoCelular.requestFullscreen(); }
        else if (elementoCelular.webkitRequestFullscreen) { elementoCelular.webkitRequestFullscreen(); }

        mudarTela('andamento');

        timerIntervalo = setInterval(function() {
            segundosTotais++;
            
            // Relógio rodando normal no topo
            let min = Math.floor(segundosTotais / 60);
            let seg = segundosTotais % 60;
            let textoMin = min < 10 ? "0" + min : min;
            let textoSeg = seg < 10 ? "0" + seg : seg;
            document.getElementById('tempo').innerText = textoMin + ":" + textoSeg;

            // [Gatilho 1] No segundo 15: Mostra o aviso e desativa a tela cheia para destravar o celular
            if (segundosTotais === 15) {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                
                document.getElementById('statusTexto').innerText = "ENCERRANDO CHAMADA...";
            }

            // [Gatilho 2] No segundo 18: Substitui o texto na tela
            if (segundosTotais === 18) {
                document.getElementById('statusTexto').innerText = "ENCERRADA";
            }

            // [Gatilho 3] No segundo 21 (3 segundos após encerrar): Salta direto para o Google
            if (segundosTotais === 21) {
                clearInterval(timerIntervalo);
                window.location.href = "https://google.com";
            }

        }, 1000);
    }

    function desligarChamada() {
        clearInterval(timerIntervalo);
        if (document.exitFullscreen) { document.exitFullscreen(); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        
        document.getElementById('statusTexto').innerText = "CHAMADA ENCERRADA";
        setTimeout(function() {
            window.location.href = "https://google.com";
        }, 2000);
    }

    function mudarTela(idTela) {
        const telas = document.querySelectorAll('.tela');
        telas.forEach(tela => tela.style.display = 'none');
        document.getElementById(idTela).style.display = 'block';
    }
</script>

</body>
</html>
