<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Chamada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .celular {
            width: 360px; height: 740px; background: #000; border: 12px solid #333;
            border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .tela { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; }
        .ativa { display: block; }

        /* 1️⃣ TELA: RECEBENDO CHAMADA */
        #recebendo { 
            background: url('calling.png') center/cover no-repeat, linear-gradient(180deg, #102a45 0%, #050e18 100%); 
        }
        
        @keyframes pulsar {
            0% { transform: translate(-50%) scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.6); }
            70% { transform: translate(-50%) scale(1.08); box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); }
            100% { transform: translate(-50%) scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        
        .btn-atender {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; background: #4caf50; border: none; border-radius: 50%;
            color: white; font-size: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            animation: pulsar 1.5s infinite; -webkit-tap-highlight-color: transparent;
        }

        /* 2️⃣ TELA: EM ANDAMENTO */
        #andamento { 
            background: url('andamento.png') center/cover no-repeat, linear-gradient(180deg, #091724 0%, #03080f 100%); 
        }
        
        /* Ajustado em 30% do topo */
        .cronometro { 
            position: absolute; top: 42%; left: 0; width: 100%; text-align: center;
            color: white; font-size: 22px; font-variant-numeric: tabular-nums; font-weight: bold;
        }

        /* Ajustado em 38% do topo */
        .status-dinamico { 
            position: absolute; top: 45%; left: 0; width: 100%; text-align: center;
            color: #ff4d4d; font-size: 18px; font-weight: bold; letter-spacing: 1px; padding: 0 10px; line-height: 1.3;
        }

        .btn-desligar {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; background: #f44336; border: none; border-radius: 50%;
            color: white; font-size: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<div class="celular" id="aparelho">
    
    <!-- TELA 1 -->
    <div id="recebendo" class="tela ativa">
        <button class="btn-atender" onclick="atenderChamada()">📞</button>
    </div>

    <!-- TELA 2 -->
    <div id="andamento" class="tela">
        <div id="tempo" class="cronometro">00:00</div>
        <div id="statusTexto" class="status-dinamico"></div>
        <button class="btn-desligar" onclick="desligarChamada()">❌</button>
    </div>

</div>
    <!-- Players de som nativos integrados ao sistema -->
<audio id="somToque" src="toque.mp3" loop preload="auto"></audio>
<audio id="audioSuspeito" src="audio.mp3" preload="auto"></audio>

    
<script>
    // Variáveis Globais de Controle de Tempo Isoladas
    let relogioEspera;
    let relogioLigacao;
    let tempoEspera = 0;
    let tempoLigacao = 0;

    // Inicializa a contagem limite de 7 segundos ao abrir a página
    relogioEspera = setInterval(function() {
        tempoEspera++;
        if (tempoEspera >= 7) {
            clearInterval(relogioEspera);
            executarCorteAutomatico();
        }
    }, 1000);

    function atenderChamada() {
      document.getElementById('somToque').pause();
document.getElementById('audioSuspeito').play().catch(function(e){});

        // [Ação Crítica] Para imediatamente o relógio de espera e limpa a variável anterior
        clearInterval(relogioEspera);

        const elementoCelular = document.getElementById('aparelho');
        if (elementoCelular.requestFullscreen) { elementoCelular.requestFullscreen(); }
        else if (elementoCelular.webkitRequestFullscreen) { elementoCelular.webkitRequestFullscreen(); }

        mudarTela('andamento');

        // Inicializa uma contagem completamente nova e do zero para a ligação
        relogioLigacao = setInterval(function() {
            tempoLigacao++;
            
            let min = Math.floor(tempoLigacao / 60);
            let seg = tempoLigacao % 60;
            let textoMin = min < 10 ? "0" + min : min;
            let textoSeg = seg < 10 ? "0" + seg : seg;
            document.getElementById('tempo').innerText = textoMin + ":" + textoSeg;

            if (tempoLigacao === 15) {
                document.getElementById('statusTexto').innerText = "ENCERRANDO CHAMADA...";
            }

            if (tempoLigacao === 18) {
                document.getElementById('statusTexto').innerText = "CHAMADA ENCERRADA";
            }

            if (tempoLigacao >= 21) {
                clearInterval(relogioLigacao);
                finalizarNavegador();
            }
        }, 1000);
    }

    function desligarChamada() {
        clearInterval(relogioLigacao);
        document.getElementById('statusTexto').innerText = "CHAMADA ENCERRADA";
        setTimeout(function() {
            finalizarNavegador();
        }, 2000);
    }

    function executarCorteAutomatico() {
     document.getElementById('somToque').pause();

        mudarTela('andamento');
        document.getElementById('statusTexto').innerText = "ENCERRANDO CHAMADA...";
        setTimeout(function() {
            document.getElementById('statusTexto').innerText = "CHAMADA ENCERRADA";
            setTimeout(function() {
                finalizarNavegador();
            }, 2500);
        }, 2500);
    }

    function finalizarNavegador() {
        if (document.exitFullscreen) { document.exitFullscreen(); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        window.location.href = "https://google.com";
    }

    function mudarTela(idTela) {
        const telas = document.querySelectorAll('.tela');
        telas.forEach(tela => tela.style.display = 'none');
        document.getElementById(idTela).style.display = 'block';
    }
</script>

</body>
</html>
