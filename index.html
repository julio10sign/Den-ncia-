<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Chamada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Moldura do Aparelho */
        .celular {
            width: 360px; height: 740px; background: #000; border: 12px solid #333;
            border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .tela { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; }
        .ativa { display: block; }

        /* 1️⃣ TELA: RECEBENDO CHAMADA (Sua Arte do Canva) */
        #recebendo { 
            background: url('calling.png') center/cover no-repeat, linear-gradient(180deg, #102a45 0%, #050e18 100%); 
        }
        
        @keyframes pulsar {
            0% { transform: translate(-50%) scale(1); filter: drop-shadow(0 0 0 rgba(76, 175, 80, 0.4)); }
            70% { transform: translate(-50%) scale(1.06); filter: drop-shadow(0 0 15px rgba(76, 175, 80, 0.6)); }
            100% { transform: translate(-50%) scale(1); filter: drop-shadow(0 0 0 rgba(76, 175, 80, 0)); }
        }
        
        /* Botão Verde PNG */
        .btn-atender-png {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            width: 22%; aspect-ratio: 1 / 1; background: none; border: none; cursor: pointer;
            animation: pulsar 1.5s infinite; -webkit-tap-highlight-color: transparent;
        }
        .btn-atender-png img { width: 100%; height: 100%; object-fit: contain; }

        /* 2️⃣ TELA: EM ANDAMENTO (Sua Arte do Canva) */
        #andamento { 
            background: url('andamento.png') center/cover no-repeat, linear-gradient(180deg, #091724 0%, #03080f 100%); 
        }
        
        /* Cronômetro posicionado */
        .cronometro { 
            position: absolute; top: 38.5%; left: 0; width: 100%; text-align: center;
            color: rgba(255,255,255,0.6); font-size: 15px; font-variant-numeric: tabular-nums; 
        }

        /* Botão Vermelho PNG */
        .btn-desligar-png {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            width: 22%; aspect-ratio: 1 / 1; background: none; border: none; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-desligar-png img { width: 100%; height: 100%; object-fit: contain; }

        /* 3️⃣ TELA: ENCERRADA */
        #encerrada { 
            background: #050e18; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; 
        }
        .texto-encerrado { color: #ff4d4d; font-size: 22px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="celular" id="aparelho">
    
    <!-- 1️⃣ TELA: RECEBENDO CHAMADA -->
    <div id="recebendo" class="tela ativa">
        <button class="btn-atender-png" onclick="atender()">
            <img src="verde.png" alt="Atender" onerror="this.style.display='none'; this.parentNode.innerText='📞'; this.parentNode.style.background='#4caf50'; this.parentNode.style.borderRadius='50%';">
        </button>
    </div>

    <!-- 2️⃣ TELA: EM ANDAMENTO -->
    <div id="andamento" class="tela">
        <div id="tempo" class="cronometro">00:00</div>
        <button class="btn-desligar-png" onclick="desligar()">
            <img src="vermelho.png" alt="Desligar" onerror="this.style.display='none'; this.parentNode.innerText='❌'; this.parentNode.style.background='#f44336'; this.parentNode.style.borderRadius='50%';">
        </button>
    </div>

    <!-- 3️⃣ TELA: ENCERRADA -->
    <div id="encerrada" class="tela">
        <div class="texto-encerrado">CHAMADA ENCERRADA</div>
    </div>

</div>

<!-- Player de Áudio Puro e Isolado -->
<audio id="audioSuspeito" src="audio.mp3" preload="auto"></audio>

<script>
    const som = document.getElementById('audioSuspeito');
    let crono;
    let contaSegundos = 0;

    function atender() {
        const container = document.getElementById('aparelho');
        if (container.requestFullscreen) { container.requestFullscreen(); }
        else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }

        mudar('andamento');

        // Blindagem técnica: Tenta dar o play, mas ignora completamente se o arquivo der erro
        try {
            som.play().catch(function(e) { console.log("Áudio rodando nativo."); });
        } catch(err) {
            console.log("Erro de codec ignorado.");
        }

        // O relógio passa a comandar o fluxo sem depender de respostas do player de áudio
        crono = setInterval(function() {
            contaSegundos++;
            let m = Math.floor(contaSegundos / 60);
            let s = contaSegundos % 60;
            let txtM = m < 10 ? "0" + m : m;
            let txtS = s < 10 ? "0" + s : s;
            document.getElementById('tempo').innerText = txtM + ":" + txtS;

            // Derruba a ligação de forma forçada e exata no segundo 14
            if (contaSegundos >= 14) {
                desligar();
            }
        }, 1000);
    }

    function desligar() {
        try { som.pause(); } catch(e){}
        clearInterval(crono);
        mudar('encerrada');

        setTimeout(function() {
            if (document.exitFullscreen) { document.exitFullscreen(); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
            
            // Saída definitiva para a página do Google
            window.location.href = "https://google.com";
        }, 2500);
    }

    function mudar(id) {
        const abas = document.querySelectorAll('.tela');
        abas.forEach(a => a.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
    }
</script>

</body>
</html>
