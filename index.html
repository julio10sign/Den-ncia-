<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Chamada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Moldura de exibição para ajustar o foco da tela */
        .celular {
            width: 360px; height: 640px; background: #000;
            overflow: hidden; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .tela { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; position: relative; }
        .ativa { display: block; }

        /* 1️⃣ TELA: RECEBENDO CHAMADA */
        #recebendo { 
            background: url('https://googleusercontent.com') center/cover; 
        }
        
        /* Animação de pulsar do botão verde */
        @keyframes pulsar {
            0% { transform: translate(-50%) scale(1); filter: drop-shadow(0 0 0 rgba(76, 175, 80, 0.6)); }
            70% { transform: translate(-50%) scale(1.08); filter: drop-shadow(0 0 15px rgba(76, 175, 80, 0)); }
            100% { transform: translate(-50%) scale(1); filter: drop-shadow(0 0 0 rgba(76, 175, 80, 0)); }
        }
        
        /* Posicionamento exato do botão verde sobre a sua arte */
        .btn-atender-png {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            width: 82px; height: 82px; background: none; border: none; cursor: pointer;
            animation: pulsar 1.5s infinite; -webkit-tap-highlight-color: transparent;
        }
        .btn-atender-png img { width: 100%; height: 100%; object-fit: contain; }

        /* 2️⃣ TELA: EM ANDAMENTO */
        #andamento { 
            background: url('https://googleusercontent.com') center/cover; 
        }

        /* Texto do cronômetro posicionado perfeitamente abaixo de "Chamada de voz" */
        .cronometro-artificial {
            position: absolute; top: 38.5%; left: 0; width: 100%;
            text-align: center; color: rgba(255,255,255,0.7); font-size: 15px;
            font-variant-numeric: tabular-nums; font-weight: normal;
        }

        /* Posicionamento exato do botão vermelho sobre a sua arte */
        .btn-desligar-png {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            width: 82px; height: 82px; background: none; border: none; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-desligar-png img { width: 100%; height: 100%; object-fit: contain; }

        /* 3️⃣ TELA: ENCERRADA */
        #encerrada { 
            background: #0f1c2e; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; gap: 15px; 
        }
        .texto-encerrado { font-size: 24px; font-weight: bold; letter-spacing: 1px; color: #ff4d4d; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .icone-fone { font-size: 45px; animation: rotate 0.5s ease; }
    </style>
</head>
<body>
<div class="celular" id="aparelho">
        <!-- 1️⃣ TELA: RECEBENDO CHAMADA -->
    <div id="recebendo" class="tela ativa">
        <button class="btn-atender-png" onclick="conectarChamada()">
            <img src="https://googleusercontent.com" alt="Atender">
        </button>
    </div>

    <!-- 2️⃣ TELA: EM ANDAMENTO -->
    <div id="andamento" class="tela">
        <div id="cronometro" class="cronometro-artificial">00:00</div>
        <button class="btn-desligar-png" onclick="derrubarChamada()">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjPLMNoF1udStnfiHhFGFw4ffVnK65poJJwgGxq7R7eFgqeODIrNhPg3sbfWRxKN0XWcgQ55yDKugadLcp4DG42du9lwlgwLoOeQG1JDwmCdVBoYl6BujykVHDvsk5yLCuuo2Qo9IniRgUrEQxvXKaFY0OU3ICSSZ9HPTbuiptITxRy46e-zrtGRuvditxx/s4800/2_20260626_013501_0000.png" alt="Desligar">
        </button>
    </div>

    <!-- 3️⃣ TELA: ENCERRADA -->
    <div id="encerrada" class="tela">
        <div class="icone-fone">Disconnected 📵</div>
        <div class="texto-encerrado">CHAMADA ENCERRADA</div>
    </div>

</div>

<!-- Player invisível. Quando tiver seu áudio, salve no GitHub com o nome 'audio.mp3' -->
<audio id="audioSuspeito" src="audio.mp3" preload="auto"></audio>

<script>
    const faixasom = document.getElementById('audioSuspeito');
    let relogioIntervalo;
    let tempoContado = 0;

    function conectarChamada() {
        // Ativa a tela cheia para sumir com as barras do navegador móvel
        const container = document.getElementById('aparelho');
        if (container.requestFullscreen) { container.requestFullscreen(); }
        else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }

        mudarDeAba('andamento');
        faixasom.play().catch(function(e) { console.log("Aguardando arquivo de áudio real ser inserido."); });

        // Inicializa o contador do visor
        relogioIntervalo = setInterval(function() {
            tempoContado++;
            let m = Math.floor(tempoContado / 60);
            let s = tempoContado % 60;
            let visorM = m < 10 ? "0" + m : m;
            let visorS = s < 10 ? "0" + s : s;
            document.getElementById('cronometro').innerText = visorM + ":" + visorS;
        }, 1000);
    }

    // Monitora o término da reprodução para o desligamento automático planejado
    faixasom.onended = function() {
        derrubarChamada();
    };

    function derrubarChamada() {
        faixasom.pause();
        clearInterval(relogioIntervalo);
        mudarDeAba('encerrada');

        // Aguarda 3 segundos na tela de encerrada e despacha para o Google saindo da tela cheia
        setTimeout(function() {
            if (document.exitFullscreen) { document.exitFullscreen(); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
            
            // Rota de encerramento definitiva: joga para o Google
            window.location.href = "https://google.com";
        }, 3000);
    }

    function mudarDeAba(alvoId) {
        const abas = document.querySelectorAll('.tela');
        abas.forEach(aba => aba.classList.remove('ativa'));
        document.getElementById(alvoId).classList.add('ativa');
    }
</script>
</body>
</html>
