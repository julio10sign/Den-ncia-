<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Chamada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Moldura Estável do Aparelho */
        .celular {
            width: 360px; height: 740px; background: #000; border: 12px solid #333;
            border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .tela { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; }
        .ativa { display: block; }

        /* 1️⃣ TELA: RECEBENDO CHAMADA (Sua Arte) */
        #recebendo { 
            background: url('calling.png') center/cover no-repeat, linear-gradient(180deg, #102a45 0%, #050e18 100%); 
        }
        
        @keyframes pulsar {
            0% { transform: translate(-50%) scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.6); }
            70% { transform: translate(-50%) scale(1.08); box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); }
            100% { transform: translate(-50%) scale(1); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        
        .btn-atender-estavel {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; background: #4caf50; border: none; border-radius: 50%;
            color: white; font-size: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            animation: pulsar 1.5s infinite; -webkit-tap-highlight-color: transparent;
        }

        /* 2️⃣ TELA: EM ANDAMENTO (Sua Arte) */
        #andamento { 
            background: url('andamento.png') center/cover no-repeat, linear-gradient(180deg, #091724 0%, #03080f 100%); 
        }
        
        .cronometro { 
            position: absolute; top: 38.5%; left: 0; width: 100%; text-align: center;
            color: rgba(255,255,255,0.6); font-size: 15px; font-variant-numeric: tabular-nums; 
        }

        /* 3️⃣ TELA: ENCERRADA */
        #encerrada { 
            background: #050e18; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; 
        }
        .texto-encerrado { color: #ff4d4d; font-size: 22px; font-weight: bold; letter-spacing: 2px; text-align: center; }
    </style>
</head>
<body>
<div class="celular" id="aparelho">
        <!-- TELA 1 -->
    <div id="recebendo" class="tela ativa">
        <button class="btn-atender-estavel" onclick="atender()">📞</button>
    </div>

    <!-- TELA 2 -->
    <div id="andamento" class="tela">
        <div id="tempo" class="cronometro">00:00</div>
    </div>

    <!-- TELA 3 -->
    <div id="encerrada" class="tela">
        <div id="textoFim" class="texto-encerrado">CHAMADA ENCERRADA</div>
    </div>

</div>

<script>
    let crono;
    let contaSegundos = 0;

    function atender() {
        const container = document.getElementById('aparelho');
        if (container.requestFullscreen) { container.requestFullscreen(); }
        else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }

        mudar('andamento');

        // Cronômetro assume o controle visual rígido da cronologia pedida
        crono = setInterval(function() {
            contaSegundos++;
            
            // Formatação do relógio na tela (00:00)
            let m = Math.floor(contaSegundos / 60);
            let s = contaSegundos % 60;
            let txtM = m < 10 ? "0" + m : m;
            let txtS = s < 10 ? "0" + s : s;
            document.getElementById('tempo').innerText = txtM + ":" + txtS;

            // [Etapa 1] No segundo 15: Transiciona para a tela final mostrando "Encerrando chamada..."
            if (contaSegundos === 15) {
                // Sai da tela cheia imediatamente aqui para liberar o navegador móvel do S21FE
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                
                document.getElementById('textoFim').innerText = "ENCERRANDO CHAMADA...";
                mudar('encerrada');
            }
            
            // [Etapa 2] No segundo 18: Substitui o texto por "CHAMADA ENCERRADA"
            if (contaSegundos === 18) {
                clearInterval(crono); // Para o relógio definitivamente
                document.getElementById('textoFim').innerText = "CHAMADA ENCERRADA";
                
                // [Etapa 3] 3 segundos depois (exatos 21 segundos de execução total): Vai para o Google
                setTimeout(function() {
                    window.location.href = "https://google.com";
                }, 3000);
            }

        }, 1000);
    }

    function mudar(id) {
        const abas = document.querySelectorAll('.tela');
        abas.forEach(a => a.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
    }
</script>
</body>
</html>
